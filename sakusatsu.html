<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sakusatsu</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f5f7f9;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { font-size: 1.5rem; color: #2c3e50; text-align: center; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 1rem;
        }
        .result-item {
            background: #f8faff;
            border-left: 4px solid #3498db;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        .result-id { font-weight: bold; color: #2980b9; }
        .no-result { text-align: center; color: #95a5a6; }
    </style>
</head>
<body>

<div class="container">
    <h1>櫻撮検索</h1>

    <label for="memberSelector">検索したいメンバーを選択：</label>
    <select id="memberSelector">
        <option value="">データを読み込み中...</option>
    </select>

    <div id="resultArea"></div>
</div>

<script>
    const csvFileName = 'sakusatsu.csv';
    let headers = [];
    let csvData = [];

    async function loadCSV() {
        try {
            const response = await fetch(csvFileName);
            if (!response.ok) throw new Error('ファイルが見つかりません');
            
            const text = await response.text();
            const lines = text.trim().split(/\r?\n/);
            
            headers = lines[0].split(',');
            const fruitNames = headers.slice(1);
            
            csvData = lines.slice(1).map(line => {
                const values = line.split(',');
                return {
                    id: values[0],
                    flags: values.slice(1)
                };
            });

            initSelector(fruitNames);

        } catch (error) {
            console.error(error);
            document.getElementById('memberSelector').innerHTML = '<option>エラー: CSVを読み込めません</option>';
        }
    }

    function initSelector(fruitNames) {
        const selector = document.getElementById('memberSelector');
        selector.innerHTML = '<option value="">選択してください</option>';
        
        fruitNames.forEach(name => {
            if(name.trim() === "") return;
            const option = document.createElement('option');
            option.value = name;
            option.textContent = name;
            selector.appendChild(option);
        });
    }

    document.getElementById('memberSelector').addEventListener('change', function() {
        const selectedFruit = this.value;
        const resultArea = document.getElementById('resultArea');
        resultArea.innerHTML = '';

        if (!selectedFruit) return;

        const fruitIndex = headers.indexOf(selectedFruit) - 1;
        const filtered = csvData.filter(row => row.flags[fruitIndex] === '1');

        if (filtered.length > 0) {
            filtered.forEach(row => {
                const included = headers.slice(1).filter((name, idx) => row.flags[idx] === '1');
                
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML = `
                    <div class="result-id">${row.id}</div>
                    <div>${included.join(', ')}</div>
                `;
                resultArea.appendChild(div);
            });
        } else {
            resultArea.innerHTML = '<p class="no-result">該当するデータはありません。</p>';
        }
    });

    loadCSV();
</script>

</body>
</html>
